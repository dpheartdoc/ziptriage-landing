    <meta name="description" content="How ZipTriage streamlines referral triage for cardiology clinics.">
    <link rel="stylesheet" href="/css/styles.css">

<body>
    <header>
        <nav>
            <a href="/">ZipTriage</a>

    <main>
        <section class="hero">
            <h1>Placeholder — Clinics Page</h1>

        <section class="contact">
            <h2>Clinic Inquiries</h2>
